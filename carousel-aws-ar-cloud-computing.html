<style>

    --font-body: 'Space Grotesk', sans-serif;
    --font-numeral: 'Inter Tight', sans-serif;
    
    /* Customizable 2-color brand colors (Defaults: Premium Deep Purple & Pure White) */
    --color-dark: #1e0b36;           /* User-defined Dark Color */
    --color-light: #ffffff;          /* User-defined Light Color */
    --color-accent: #ccff00;         /* Solid neon yellow/lime marker pop */
    
    --text-on-dark: #ffffff;
    --text-on-light: var(--color-dark);
    --text-on-accent: #000000;
    --text-on-accent-emph: #000000;
    
    --radius: 0px;                   /* Premium clean sharp corners */
    --tracking-h: -2.5px;
    --tracking-h2: -1.8px;
    --weight-heading: 800;
    --weight-numeral: 900;
    --line-h: 1.15;
    --bignum-opacity: 0.035;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0f14;
    padding: 50px 20px;
    font-family: var(--font-body);
    min-height: 100vh;
  }

  .slides {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    justify-content: center;
  }

  .slide {
    width: 432px;
    height: 540px;
    border-radius: var(--radius);
    padding: 48px 44px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    background: var(--color-light);
    color: var(--color-dark);
    transition: background 0.3s, color 0.3s;
  }

  /* Cover Slide (Dark Slide) Styling */
  .slide.cover, .slide.dark-slide {
    background: var(--color-dark) !important;
    color: #ffffff !important;
  }

  /* Content Slides Styling */
  .slide.content-slide, .slide.light-slide {
    background: var(--color-light) !important;
    color: var(--color-dark) !important;
  }

  /* Sophisticated B2B watermark */
  .watermark {
    position: absolute;
    bottom: 30px; /* Positioned lower */
    left: 47%;    /* Shifted slightly to the left */
    transform: translate(-50%, 0) rotate(-3deg); /* Gently rotated */
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 240px;
    pointer-events: none;
    z-index: 1;
    color: var(--color-dark);
    opacity: 0.022; /* Barely visible, strictly between 0.02 and 0.025 */
    line-height: 1;
    text-align: center;
    letter-spacing: -6px;
    user-select: none;
    mix-blend-mode: multiply;
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.8) 60%, rgba(0,0,0,0) 100%);
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.8) 60%, rgba(0,0,0,0) 100%);
  }

  .slide.cover .watermark, .slide.dark-slide .watermark {
    color: #ffffff !important;
    opacity: 0.025; /* strictly between 0.02 and 0.025 */
    mix-blend-mode: overlay;
  }

  .top, .bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 2;
  }
  body.lang-ar .top, body.lang-ar .bottom {
    text-transform: none;
    letter-spacing: 0;
  }

  .bottom {
    margin-top: auto;
    width: 100%;
  }

  .bottom > * {
    flex: 1;
  }
  .bottom .footer-left {
    text-align: start;
  }
  .bottom .footer-brand {
    text-align: center;
    font-family: 'Inter', sans-serif !important;
    font-weight: 700;
    text-transform: none;
    letter-spacing: 0.5px;
    opacity: 0.8;

  .bottom .arrow {

  .dot {

    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;

  body.lang-ar .dot {
    margin-right: 0;
    margin-left: 8px;
  }
  .slide.cover .dot, .slide.dark-slide .dot {

  }

  .content {

    flex-direction: column;
    justify-content: center;

  }

// ============ Programmatic 30/70 Distribution Logic ============
function isDarkSlide(i, total) {
  if (i === 0) return true; // Cover slide (always dark)
  if (i === total - 1) return true; // Conclusion slide (always dark)
  
  // Transitional middle slide (for N >= 5, pick a middle slide)
  if (total >= 5) {
    const middleIndex = Math.floor(total / 2);
    if (i === middleIndex) return true;
  }
  return false;
}

// ============ RENDERER ============
function renderSlides() {

    const pageNum = String(num).padStart(2,'0') + ' / ' + totalSlides;

    let body = '';

      // First slide (Cover) - Centered content, massive bold font, NO subtext!
      body = `<div class="cover-content"><h1>${s.main}</h1></div>`;
    } else {
      // Subsequent slides (Content Slides)
      if (s.type === 'hook') {
        const tag = s.tag || 'h2';
        body = `<${tag}>${s.main}</${tag}>`;
        if (s.sub) body += `<div style="height:20px;"></div><div class="body-text" style="opacity:0.8;">${s.sub}</div>`;
      } else if (s.type === 'stack') {
        body = '';
        if (s.main) body += `<h2>${s.main}</h2>`;
        if (s.sub) body += `<div style="height:12px;"></div><div class="body-text" style="opacity:0.8;font-size:16px;line-height:1.4;margin-bottom:12px;">${s.sub}</div>`;
        body += `<div class="stack" style="gap:14px;">${s.rows.map(r => `<div class="row" style="padding-top:8px;gap:2px;"><div class="cat" style="font-size:11px;margin-bottom:2px;">${r.cat}</div><div class="val" style="font-size:18px;">${r.val}</div></div>`).join('')}</div>`;
      } else if (s.type === 'steps') {
        body = '';
        if (s.main) body += `<h2>${s.main}</h2>`;
        if (s.sub) body += `<div style="height:12px;"></div><div class="body-text" style="opacity:0.8;font-size:16px;line-height:1.4;margin-bottom:12px;">${s.sub}</div>`;
        body += `<div class="steps-container">${s.items.map((t, idx) => `<div class="step" style="padding:10px 0;"><span class="step-num" style="color:var(--color-accent);">${String(idx+1).padStart(2,'0')}</span><span class="step-text" style="font-size:20px;">${t}</span></div>`).join('')}</div>`;
      } else if (s.type === 'cta') {
        body = `<div class="cta-main">${s.main}</div><div class="body-text" style="opacity:0.8; margin-bottom: 24px;">${s.sub}</div>`;
        if (s.cta) body += `<div class="cta-sub">↓<br>${s.cta}</div>`;
      }
    }

    const arrowChar = i === slides.length - 1 ? langCfg.endLabel : langCfg.arrow;
    return `
      <div class="${slideClass}">
        <div class="watermark">B2B</div>
        <div class="top"><span><span class="dot"></span>${s.label}</span><span class="pagenum">${pageNum}</span></div>
        <div class="content">${body}</div>
        <div class="bottom">
          <span class="footer-left">${s.footer}</span>
          <span class="footer-brand">BitToBest</span>
          <span class="arrow">${arrowChar}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ============ THEME APPLICATION ============
function applyTheme(name) {
  const t = themes[name];
  const lang = window.currentLanguage || 'en';
  const r = document.documentElement;
  r.style.setProperty('--font-heading', t.fonts[lang].heading);
  r.style.setProperty('--font-body', t.fonts[lang].body);
  r.style.setProperty('--font-numeral', t.fonts[lang].numeral);
  
  // Use custom colors if defined, otherwise use theme defaults
  const darkColor = window.customDarkColor || t.colors.dark;
  const lightColor = window.customLightColor || t.colors.light;
  const accentColor = t.colors.accent || '#ccff00';
  
  r.style.setProperty('--color-dark', darkColor);
  r.style.setProperty('--color-light', lightColor);
  r.style.setProperty('--color-accent', accentColor);
  
  r.style.setProperty('--text-on-dark', t.text.onDark);
  r.style.setProperty('--text-on-light', darkColor);
  r.style.setProperty('--text-on-accent', t.text.onAccent);
  r.style.setProperty('--text-on-accent-emph', t.text.onAccentEmph);
  r.style.setProperty('--radius', t.radius);
  r.style.setProperty('--tracking-h', t.tracking.h);
  r.style.setProperty('--tracking-h2', t.tracking.h2);
  r.style.setProperty('--weight-heading', t.weights.heading);
  r.style.setProperty('--weight-numeral', t.weights.numeral);
  r.style.setProperty('--line-h', t.lineHeight);
  r.style.setProperty('--bignum-opacity', t.bignumOpacity);
  window.currentTheme = name;
}

// ============ LANGUAGE APPLICATION ============
function applyLanguage(name) {
  const l = languages[name];
  document.documentElement.lang = l.htmlLang;
  document.documentElement.dir = l.dir;
  document.body.classList.remove('lang-en', 'lang-ar');
  document.body.classList.add('lang-' + name);
  window.currentLanguage = name;

  // Update download button text
  document.getElementById('download-btn').textContent = l.downloadBtn;

  // Re-apply theme so font swaps to language-appropriate variant
  if (window.currentTheme) applyTheme(window.currentTheme);

  // Re-render slides so arrow chars and end label update
  renderSlides();
}

// ============ DYNAMIC 2-COLOR ENGINE CUSTOMIZER ============
function applyCustomColors(dark, light) {
  window.customDarkColor = dark;
  window.customLightColor = light;
  const r = document.documentElement;
  r.style.setProperty('--color-dark', dark);
  r.style.setProperty('--color-light', light);
  r.style.setProperty('--text-on-light', dark);
  
  // Sync inputs
  const darkPicker = document.getElementById('dark-color-picker');
  const lightPicker = document.getElementById('light-color-picker');
  if (darkPicker) darkPicker.value = dark;
  if (lightPicker) lightPicker.value = light;
}

// ============ PDF EXPORT ============
async function downloadPDF() {
  if (document.fonts && document.fonts.ready) {
    await document.fonts.ready;
  }
  window.print();
}

async function downloadImages() {
    const btn = document.getElementById('download-images-btn');
    btn.textContent = 'جاري... ⏳';
    btn.disabled = true;

    const zip = new JSZip();
    const slidesElements = document.querySelectorAll('.slide');
    
    for (let i = 0; i < slidesElements.length; i++) {
        const originalRadius = slidesElements[i].style.borderRadius;
        slidesElements[i].style.borderRadius = '0px'; 

        const canvas = await html2canvas(slidesElements[i], {
            scale: 3,
            useCORS: true,
            logging: false
        });
        
        slidesElements[i].style.borderRadius = originalRadius;

        const imgData = canvas.toDataURL('image/png').split(',')[1];
        zip.file(`slide-${i + 1}.png`, imgData, {base64: true});
    }

    const content = await zip.generateAsync({type: "blob"});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(content);
    link.download = "BitToBest_Carousels.zip";
    link.click();

    btn.textContent = '📷 صور (ZIP)';
    btn.disabled = false;
}
</script>
